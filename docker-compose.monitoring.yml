version: '3.8'

services:
  # =========================================
  # Prometheus
  # =========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus_alert_rules.yml:/etc/prometheus/prometheus_alert_rules.yml:ro
      - ./monitoring/prometheus_recording_rules.yml:/etc/prometheus/prometheus_recording_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - monitoring

  # =========================================
  # Alertmanager
  # =========================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring

  # =========================================
  # Grafana
  # =========================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./tasks/nomad_grafana_dashboard/nomad_cluster_health_dashboard.json:/var/lib/grafana/dashboards/nomad_cluster_health.json:ro
      - ./tasks/consul_grafana_dashboard/consul_cluster_health_dashboard.json:/var/lib/grafana/dashboards/consul_cluster_health.json:ro
      - ./tasks/vault_grafana_dashboard/vault_cluster_health_dashboard.json:/var/lib/grafana/dashboards/vault_cluster_health.json:ro
      - ./tasks/app_logs_dashboard/app_logs_dashboard.json:/var/lib/grafana/dashboards/app_logs_dashboard.json:ro
      - ./tasks/node_observability_dashboard/node_observability_dashboard.json:/var/lib/grafana/dashboards/node_observability_dashboard.json:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring

  # =========================================
  # Loki (App Logs)
  # =========================================
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/config.yaml:ro
    command: -config.file=/etc/loki/config.yaml
    networks:
      - monitoring

  # =========================================
  # Promtail (Log Shipper)
  # =========================================
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml:ro
      # Mounting a dummy app log directory or docker daemon logs for demonstration
      # On Docker Desktop Windows, getting host logs requires specific paths.
      # We'll just configure it to scrape its own logs and any /var/log paths accessible to the container.
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - monitoring

  # =========================================
  # Node Exporter (Node Observability)
  # =========================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - monitoring

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
