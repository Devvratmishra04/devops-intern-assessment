name: CI Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run hello.py
        run: python hello.py

      - name: Run sysinfo script
        run: |
          chmod +x scripts/sysinfo.sh
          bash scripts/sysinfo.sh

      - name: Build Docker image
        run: docker build -t hello-devops:latest .

      - name: Run Docker container
        run: docker run --rm hello-devops:latest
