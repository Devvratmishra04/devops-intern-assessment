# =========================================
# Alertmanager Configuration
# =========================================
# Routes alerts from Prometheus to notification channels
# based on severity labels.

global:
  resolve_timeout: 5m

  # --- SMTP (Email) ---
  smtp_smarthost: 'email-smtp.us-east-1.amazonaws.com:587'
  smtp_from: 'alerts@glynac.ai'
  smtp_auth_username: 'REPLACE_WITH_SES_SMTP_USER'
  smtp_auth_password: 'REPLACE_WITH_SES_SMTP_PASSWORD'
  smtp_require_tls: true

  # --- Slack ---
  slack_api_url: 'http://alertmanager-slack-webhook.local/api'

# =========================================
# Inhibition Rules
# =========================================
# Suppress lower-severity alerts when a higher-severity
# alert is already firing for the same service/instance.
inhibit_rules:
  # If a critical alert fires, suppress warnings for the same service
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['service', 'instance']

  # If TargetDown fires, suppress all other alerts from that instance
  - source_matchers:
      - alertname = TargetDown
    target_matchers:
      - severity =~ "warning|critical"
    equal: ['instance']

# =========================================
# Routing Tree
# =========================================
route:
  # Default receiver for unmatched alerts
  receiver: 'slack-warning'

  # Group alerts by service and alert name
  group_by: ['service', 'alertname']

  # Wait before sending first notification for a new group
  group_wait: 30s

  # Wait before sending updates for an existing group
  group_interval: 5m

  # Wait before re-sending a notification for an unchanged alert
  repeat_interval: 4h

  routes:
    # --- CRITICAL: PagerDuty + Slack + Email ---
    - matchers:
        - severity = critical
      receiver: 'critical-multi-channel'
      group_wait: 10s
      repeat_interval: 1h
      continue: false

    # --- WARNING: Slack only ---
    - matchers:
        - severity = warning
      receiver: 'slack-warning'
      group_wait: 30s
      repeat_interval: 4h
      continue: false

    # --- INFO: Slack info channel ---
    - matchers:
        - severity = info
      receiver: 'slack-info'
      group_wait: 1m
      repeat_interval: 12h
      continue: false

# =========================================
# Receivers
# =========================================
receivers:
  # --- Critical: Multi-Channel (PagerDuty + Slack + Email) ---
  - name: 'critical-multi-channel'
    pagerduty_configs:
      - service_key: 'REPLACE_WITH_PAGERDUTY_SERVICE_KEY'
        severity: 'critical'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          service: '{{ .CommonLabels.service }}'
          description: '{{ .CommonAnnotations.description }}'
          runbook_url: '{{ .CommonAnnotations.runbook_url }}'

    slack_configs:
      - channel: '#alerts-critical'
        color: '#FF0000'
        title: '🚨 CRITICAL: {{ .CommonLabels.alertname }}'
        text: |
          *Service:* {{ .CommonLabels.service }}
          *Instance:* {{ .CommonLabels.instance }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}
        send_resolved: true

    email_configs:
      - to: 'dvp@glynac.ai'
        headers:
          Subject: '[CRITICAL] {{ .CommonLabels.alertname }} - {{ .CommonLabels.service }}'
        html: |
          <h2>🚨 Critical Alert: {{ .CommonLabels.alertname }}</h2>
          <p><strong>Service:</strong> {{ .CommonLabels.service }}<br>
          <strong>Instance:</strong> {{ .CommonLabels.instance }}<br>
          <strong>Summary:</strong> {{ .CommonAnnotations.summary }}<br>
          <strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          {{ if .CommonAnnotations.runbook_url }}<p><a href="{{ .CommonAnnotations.runbook_url }}">📖 Runbook</a></p>{{ end }}
        send_resolved: true

  # --- Warning: Slack Only ---
  - name: 'slack-warning'
    slack_configs:
      - channel: '#alerts-warning'
        color: '#FFA500'
        title: '⚠️ WARNING: {{ .CommonLabels.alertname }}'
        text: |
          *Service:* {{ .CommonLabels.service }}
          *Instance:* {{ .CommonLabels.instance }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
        send_resolved: true

  # --- Info: Slack Only ---
  - name: 'slack-info'
    slack_configs:
      - channel: '#alerts-info'
        color: '#36A2EB'
        title: 'ℹ️ INFO: {{ .CommonLabels.alertname }}'
        text: |
          *Service:* {{ .CommonLabels.service }}
          *Summary:* {{ .CommonAnnotations.summary }}
        send_resolved: true
