global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "prometheus_alert_rules.yml"
  - "prometheus_recording_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # =========================================
  # Prometheus Self-Monitoring
  # =========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus

  # =========================================
  # Alertmanager
  # =========================================
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: alertmanager

  # =========================================
  # HashiCorp Nomad
  # =========================================
  - job_name: 'nomad'
    metrics_path: '/v1/metrics'
    params:
      format: ['prometheus']
    # If Nomad ACLs are enabled, uncomment:
    # bearer_token: 'YOUR_NOMAD_ACL_TOKEN'
    static_configs:
      - targets:
          - 'nomad-server-01:4646'
          - 'nomad-server-02:4646'
          - 'nomad-server-03:4646'
        labels:
          cluster: 'nomad'
          role: 'server'

  - job_name: 'nomad-clients'
    metrics_path: '/v1/metrics'
    params:
      format: ['prometheus']
    static_configs:
      - targets:
          - 'nomad-client-01:4646'
          - 'nomad-client-02:4646'
        labels:
          cluster: 'nomad'
          role: 'client'

  # =========================================
  # HashiCorp Consul
  # =========================================
  - job_name: 'consul'
    metrics_path: '/v1/agent/metrics'
    params:
      format: ['prometheus']
    # If Consul ACLs are enabled, uncomment:
    # bearer_token: 'YOUR_CONSUL_ACL_TOKEN'
    static_configs:
      - targets:
          - 'consul-server-01:8500'
          - 'consul-server-02:8500'
          - 'consul-server-03:8500'
        labels:
          cluster: 'consul'
          role: 'server'

  # =========================================
  # HashiCorp Vault
  # =========================================
  - job_name: 'vault'
    metrics_path: '/v1/sys/metrics'
    params:
      format: ['prometheus']
    # If unauthenticated_metrics_access is false, uncomment:
    # bearer_token: 'YOUR_VAULT_PROMETHEUS_TOKEN'
    static_configs:
      - targets:
          - 'vault-01:8200'
          - 'vault-02:8200'
          - 'vault-03:8200'
        labels:
          cluster: 'vault'

  # =========================================
  # Node Exporter (Node Observability)
  # =========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'docker-host'
